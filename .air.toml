root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/aurelia.exe ./cmd/aurelia/"
  bin = "./tmp/aurelia.exe"
  delay = 1000
  exclude_dir = ["tmp", "bridge", "node_modules", "docs", "assets", ".git", ".cache"]
  exclude_file = []
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = true
  follow_symlink = false
  include_dir = ["cmd", "internal", "pkg"]
  include_ext = ["go"]
  kill_delay = 500
  send_interrupt = true
  stop_on_error = true

[log]
  time = false
  main_only = true

[misc]
  clean_on_exit = true
