                  - paragraph [ref=e447]:
                    - generic [ref=e448]:
                      - text: Everyone is celebrating the PM who codes. The PM who opens Claude Code and ships a prototype before lunch. The PM who does not need to wait for engineering anymore.
                      - text: I get the appeal. I really do. I have done it myself. There is something intoxicating about going from idea to working thing in a single afternoon.
                      - text: But here is what I am starting to see happen and nobody is talking about it.
                      - text: The PM who can build everything themselves is slowly becoming the PM who cannot lead a team.
                      - text: When you can prototype it yourself, you stop writing specs that help engineers understand the why. When you can spin up a demo in an hour, you stop having the hard alignment conversations that make your team feel ownership over the product. When you can just do it, you lose the muscle of getting other people to want to do it with you.
                      - text: I watched this happen to a PM on my team last year. Incredibly talented. Could build faster than most of our engineers. But over time the engineers started checking out. They felt like order takers. The PM was making all the design decisions in the prototype and handing them a finished thing to rebuild in production code. The team lost its sense of creative ownership and attrition followed.
                      - text: The best PMs I know right now are using AI to think faster, not to build alone. They use it to stress test their ideas before bringing them to the team. They use it to prepare better for design reviews, not to skip them. They use it to be a better collaborator, not to replace collaboration.
                      - text: The PM who can do everything themselves is impressive. The PM who makes everyone around them better is the one who actually ships great products at scale.
                      - text: Building alone is a superpower. Knowing when not to use it is wisdom.
