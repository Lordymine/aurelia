                  - paragraph [ref=e293]:
                    - generic [ref=e294]:
                      - text: 👀 Devs vão programar em outro nível de abstração
                      - text: "Se você ficou desconfortável com a ideia de que o código-fonte está deixando de ser a fonte da verdade, talvez esse seja o motivo: sua referência de “programar” está mudando."
                      - text: Ao longo da história, o trabalho de desenvolvimento sempre evoluiu para níveis mais altos de abstração.
                      - text: Já programamos com cartão perfurado.
                      - text: Depois, assembly.
                      - text: Depois, linguagens de baixo nível.
                      - text: Depois, linguagens de alto nível.
                      - text: Hoje, a maioria das pessoas não se preocupa com alocação de memória ou instruções de máquina. E ninguém acha que isso significa que “programar acabou”.
                      - text: Estamos dando mais um passo.
                      - text: "Programar está deixando de ser escrever código linha a linha e passando a ser definir claramente o que precisa ser construído: contexto, regras, restrições, padrões e critérios de qualidade."
                      - text: O código continua existindo. Mas ele passa a ser uma consequência.
                      - text: Isso explica por que muitos devs estão desconfortáveis.
                      - text: Muita gente passou anos otimizando sua habilidade de escrever código, e agora isso deixa de ser o centro do trabalho.
                      - text: Mas essa não é a primeira vez que isso acontece.
                      - text: Em algum momento, alguém que dominava assembly também achou estranho quando começaram a surgir linguagens de mais alto nível. E provavelmente pensou que aquilo era “menos controle” ou “menos engenharia”.
                      - text: "No fim, o que aconteceu foi o contrário: conseguimos construir sistemas mais complexos, mais rápido."
                      - text: A pergunta não é se você vai parar de programar.
                      - text: É em qual nível de abstração você quer operar.
                      - text: Nos próximos textos, vou aprofundar o que passa a ser a fonte da verdade, o papel das especificações e como isso muda o trabalho do time.
