                  - paragraph [ref=e1175]:
                    - generic [ref=e1176]:
                      - text: "Eu proibia deploy na sexta-feira. Até perceber que o problema nunca foi a sexta. A regra era sagrada no time: \"Não sobe nada depois de quinta às 16h.\" Todo mundo concordava. Ninguém queria ser o responsável por um incidente no fim de semana. Funcionou por um tempo. Mas o efeito colateral foi silencioso. Segunda-feira virou caos. Fila de PRs acumulados. Deploy gigante com mudanças de três, quatro dias. Mais risco, mais conflito, mais coisa quebrando. A gente trocou o risco de sexta pelo risco de segunda. Só que na segunda ninguém chamava de \"risco\". Chamava de \"rotina\". O problema real era outro: pipeline frágil, rollback manual, zero observabilidade e nenhum processo de verificação pós-deploy. Proibir deploy na sexta era um band-aid num processo que não funcionava em dia nenhum. Mudei a abordagem. Investimos em rollback automático, alertas reais, deploy incremental e feature flags. Resultado: o time passou a fazer deploy qualquer dia da semana. Inclusive sexta. Sem medo. Se o seu processo de deploy depende do dia da semana pra ser seguro, o problema não é o calendário. É a sua pipeline. O seu time faz deploy na sexta com confiança ou com medo?"
