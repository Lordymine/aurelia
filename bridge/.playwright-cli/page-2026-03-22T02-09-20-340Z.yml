                            - text: "I think you’re highlighting a real failure mode... but the root cause isn’t PMs who code. What you’re describing usually shows up when engineering ownership is already weak. Strong teams don’t check out when a PM prototypes... they engage, challenge, and make it better. If engineers become order takers, it’s often because: - the problem space isn’t truly owned by engineering - the bar for technical leadership is low - or the org is optimizing for speed over shared ownership AI just amplifies this dynamic. In that setup, yeah… I could argue this PM doesn’t actually need an engineering team.. at least not for product thinking. Just people to handle pipelines, infra, and production hardening."
