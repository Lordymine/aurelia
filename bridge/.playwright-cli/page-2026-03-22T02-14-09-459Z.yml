                  - paragraph [ref=e1275]:
                    - generic [ref=e1276]:
                      - text: "Gerar um Design System do zero com IA é incrivelmente fácil. O verdadeiro desafio é o mundo real. Nas últimas semanas, mergulhei fundo em ferramentas como Antigravity, Claude Code e Gemini para entender o impacto delas na nossa área. Minha tática foi simples: alimentar a IA com referências e styleguides complexos, e pedir para ela gerar um sistema do zero. Os resultados me assustaram (no bom sentido): O tempo despencou: A IA estruturou a documentação do Design System e refinou a formatação de textos e comportamentos de containers em uma fração do tempo que eu levaria manualmente. O refino ainda é humano: O HTML gerado na IDE não vai perfeitamente para o Figma; os ajustes de espaçamento e hierarquia ainda exigem o olhar crítico do designer. Mas a grande reflexão que tirei desse estudo foi outra: me poupou muito tempo criando do zero, mas como isso se aplica em um contexto profissional real? Em uma empresa, você já tem um ecossistema rodando, tokens de design estritos, código legado e restrições de negócio. O valor do Design Engineer não está em pedir para a IA criar uma tela nova, mas sim em auditar e governar esses agentes para que eles respeitem a arquitetura de um produto que já existe (sem quebrar tudo). Para a galera que já está implementando agentes de IA no dia a dia: como vocês estão fazendo a IA respeitar os tokens e a estrutura de um produto legado?"
