                  - paragraph [ref=e1057]:
                    - generic [ref=e1058]:
                      - text: "Equipes perdem meses reinventando arquiteturas de agentes que já existem. Tem time construindo agente do zero. Tem time copiando tutorial sem entender a lógica. Tem time usando padrões validados por empresas que já estão em produção. Quem não entende os padrões, reinventa o que já foi resolvido. Aqui estão os 6 padrões de design de agentes de IA: Padrão 1: agente ReAct (usado por Marketing Chat) - O que é: framework onde o agente alterna entre raciocinar (LLM) e agir (ferramentas como Google ou email). - Quando usar: a espinha dorsal de quase todos os agentes de IA que você já usou. ReAct superou métodos de imitação e reinforcement learning em 34% de taxa de sucesso. Padrão 2: agentes CodeAct (usado pelo Manus) - O que é: agente que interage com ambiente de código para pensar, agir e produzir código. - Quando usar: geração complexa de código e fluxos autônomos de desenvolvimento. CodeAct supera alternativas em até 20% e requer 30% menos passos que JSON. Padrão 3: RAG agêntico (usado por Perplexity) - O que é: sistema onde agente recupera informações e usa gerador para produzir saídas contextuais. - Quando usar: pesquisa, análise de documentos, respostas que exigem precisão e fontes. RAG agêntico alcança 85% de precisão e 80% de recall. Padrão 4: CUA - computer use agent (usado pelo Operator) - O que é: agentes usam ferramentas de computador para executar ações em nome dos usuários. - Quando usar: automação em interfaces gráficas, navegação web, preenchimento de formulários. CUA alcança 38,1% de sucesso em OSWorld e 87% em WebVoyager. Padrão 5: autorreflexão (usado por Marketing Chat) - O que é: agente gera resultados iniciais, depois critica sua própria saída usando memória e ferramentas. - Quando usar: conteúdo, código ou análise que exigem alta precisão. Autorreflexão melhora significativamente performance (p < 0.001). Padrão 6: interoperabilidade multi-agente (protocolo A2A) - O que é: agentes construídos em diferentes frameworks se comunicam entre si. - Quando usar: fluxos corporativos com agentes especializados e multiplataforma. Mais de 50 parceiros já adotaram, incluindo Salesforce, SAP e PayPal. A diferença entre os padrões: ReAct: raciocina e age em loop CodeAct: pensa em código RAG agêntico: pesquisa e valida CUA: usa o computador como humano Autorreflexão: critica e melhora Multi-agente: agentes conversam entre si Você não precisa dominar os 6 padrões. Precisa saber qual usar para cada problema. Porque quem entende a arquitetura, constrói agentes que funcionam."
