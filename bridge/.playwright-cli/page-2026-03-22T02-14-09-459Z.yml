                  - paragraph [ref=e1383]:
                    - generic [ref=e1384]:
                      - text: "Você não precisa de 10 ferramentas de IA. Precisa das certas, no lugar certo. Uma das perguntas que mais recebo é: \"Nardon, por onde eu começo com IA?\" E o erro mais comum que eu vejo é gente usando a ferramenta errada pro problema errado. Depois reclama que IA não funciona. Montei esse comparativo com as 3 versões do Claude que eu uso no dia a dia e no G4, além da nossa plataforma própria. Cada uma resolve um tipo de problema diferente. Claude AI é o pensador. Pra rascunhar, pesquisar, explorar ideias, resumir conteúdo longo. Configuração zero. Abre e usa. O trade-off: não acessa seu sistema e precisa de acompanhamento manual. Claude Code é o executor. Roda direto no terminal como agente autônomo de programação. Constrói, refatora, escreve testes e corrige falhas sozinho. Contexto profundo da base de código. Mas precisa de revisão cuidadosa. Claude Cowork é o operacional. Feito pra quem não é dev. Organiza arquivos em massa, extrai dados de PDF pra planilha, automatiza copiar e colar entre aplicativos. Zero código. Ainda em beta, mas já funciona. Não é sobre qual é melhor. É sobre qual resolve o seu problema. Salva esse comparativo. Vai te poupar horas de tentativa e erro. Link no primeiro comentário pra quem quer mais."
