                      - text: Coding Agents? We're using the wrong word. Everyone's building "coding agents." Agent implies autonomy, planning, its own agenda. A principal-agent relationship with all the misaligned incentives that come with it. What we actually want is a coding daemon. The Greek daimon wasn't a god. It was an intermediary spirit. Socrates described his as a voice that never told him what to do it only warned him when he was about to do something wrong. Purely reactive. No will of its own. In service to the human's reasoning, not substituting for it. The Unix tradition inherited this meaning faithfully. A daemon doesn't decide what to serve. It serves what's asked, reliably, in the background. The best AI coding tools already work this way. We just gave them the wrong name. I suggest coding daemon not coding agent.
